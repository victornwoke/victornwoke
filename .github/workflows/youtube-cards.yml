name: GitHub Readme YouTube Cards

on:
  schedule:
    - cron: "0 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/youtube-cards.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your repo (required before modifying README)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required so pull --rebase works

      # 2. Generate YouTube cards
      - name: Generate YouTube Cards
        uses: DenverCoder1/github-readme-youtube-cards@main
        with:
          channel_id: UC2FF3DKtrSB4NDs01gv1p3w
          comment_tag_name: YOUTUBE-CARDS
          max_title_lines: 2
          youtube_api_key: ${{ secrets.YOUTUBE_API_KEY }}
          show_duration: true
          output_type: html

      # 3. Configure Git for the bot
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      # 4. Pull latest changes to avoid non-fast-forward errors
      - name: Pull latest changes
        run: git pull origin main --rebase

      # 5. Commit changes (if any)
      - name: Commit changes
        run: |
          git add .
          git commit -m "Update YouTube cards" || echo "No changes to commit"

      # 6. Push changes back to your profile repo
      - name: Push changes
        run: git push origin main
